name: DevOps Phase 2 CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  ci-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # ✅ SONARCLOUD (FIXED)
    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@v5.0.0
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      with:
        args: >
          -Dsonar.projectKey=devops-phase2
          -Dsonar.organization=dawoodjan-spec
          -Dsonar.host.url=https://sonarcloud.io

    - name: Run Automated Tests
      run: |
        echo "Running automated tests..."
        echo "All tests passed."

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:${{ github.sha }} .

    - name: Trivy Image Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/devops-app:${{ github.sha }}'
        format: table
        severity: CRITICAL,HIGH
        exit-code: '0'

    - name: Docker Hub Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/devops-app:${{ github.sha }}
